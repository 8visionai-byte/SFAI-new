<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SimpleFast.ai">
  <title>SimpleFast.ai</title>
  <defs>
    <!-- Metaliczny gradient znaku: niebieski -> fiolet -> zielony (akcent AI) -->
    <linearGradient id="sf-metal" x1="16" y1="6" x2="48" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4aa6ff"/>
      <stop offset="0.5" stop-color="#9168f7"/>
      <stop offset="1" stop-color="#2bd2a3"/>
    </linearGradient>
    <!-- Srebrna krawędź (glossy obrys) -->
    <linearGradient id="sf-edge" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3f6fc"/>
      <stop offset="0.5" stop-color="#b6c0d2"/>
      <stop offset="1" stop-color="#e9eef6"/>
    </linearGradient>
    <!-- Tło kafelka (ciemny „tech", by metal czytał się w 32px) -->
    <linearGradient id="sf-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101a30"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="sf-gloss" cx="0.35" cy="0.28" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#cdd6e6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#cdd6e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Kafelek -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sf-bg)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#26375e" stroke-width="1.5"/>

  <!-- Znak skalowany z viewBox 24 -> 64: translate(8,8) scale(2) -->
  <g transform="translate(8 8) scale(2)">
    <!-- Srebrna krawędź (glossy) -->
    <g fill="none" stroke="url(#sf-edge)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
      <path d="M12 5 L5.5 20"/>
      <path d="M12 5 L18.5 20"/>
      <path d="M7.6 11 H13.2"/>
    </g>
    <!-- Nogi cyrkla + ramię F (metal) -->
    <g fill="none" stroke="url(#sf-metal)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5 L5.5 20"/>
      <path d="M12 5 L18.5 20"/>
      <path d="M7.6 11 H13.2"/>
    </g>
    <!-- Krzywa S (ścieżka nawigatora) -->
    <path d="M16.6 7.2 C12.4 7.6 11 10.2 12.4 12 C13.8 13.8 12.2 16.6 8.2 16.9" fill="none" stroke="url(#sf-metal)" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M16.6 7.2 C12.4 7.6 11 10.2 12.4 12 C13.8 13.8 12.2 16.6 8.2 16.9" fill="none" stroke="#eaf0fb" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
    <!-- Pivot (zawias) + błysk -->
    <circle cx="12" cy="4.4" r="2.4" fill="url(#sf-metal)" stroke="url(#sf-edge)" stroke-width="0.9"/>
    <circle cx="12" cy="4.4" r="2.4" fill="url(#sf-gloss)"/>
  </g>
</svg>
